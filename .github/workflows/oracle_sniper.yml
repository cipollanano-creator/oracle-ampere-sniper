name: Oracle Ampere Sniper

on:

  workflow_dispatch:

jobs:
  run-sniper:
    runs-on: ubuntu-latest

    steps:
    - name: Controlla il codice dal repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Esegui il Cecchino Oracle
      env:
        OCI_USER: ${{ secrets.OCI_USER }}
        OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      # Facciamo finta che vada sempre tutto bene (|| true) così da non bloccare il workflow prima dell'ultimo step
      run: python sniper.py || true

    - name: Riavvia il loop istantaneamente
      if: always()
      run: |
        if [ -f "vittoria.txt" ]; then
          echo "🎉 Server creato con successo! Il cecchino si ferma qui."
        else
          echo "🔄 Nessun server creato (o sessione interrotta). Lancio un nuovo ciclo immediato..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/oracle_sniper.yml/dispatches \
            -d '{"ref":"main"}'
        fi

name: Oracle Ampere Sniper

on:
  schedule:
    # Il salvagente scatta ogni 6 ore se il loop si è interrotto
    - cron: '0 */6 * * *'
  workflow_dispatch:

# ── ABILITAZIONE PERMESSI GLOBALI (Risolve l'exit code 4) ──────────────────────
permissions:
  actions: write
  contents: read
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    steps:
    - name: Controlla il codice dal repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Controllo intelligente duplicati (Anti-Sdoppiamento)
      id: check_duplicate
      env:
        # Usiamo il token standard di sistema che ora ha i permessi corretti
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Conta quanti workflow sono in corso in questo momento
        RUNNING=$(gh run list --workflow=oracle_sniper.yml --status=in_progress --json databaseId --jq 'length')
        echo "🔍 Cecchini attivi rilevati: $RUNNING"
        
        if [ "$RUNNING" -gt "1" ]; then
          echo "⚠️ Un cecchino è già in azione. Mi spengo senza riavviare nulla."
          echo "IS_DUPLICATE=true" >> $GITHUB_ENV
        else
          echo "IS_DUPLICATE=false" >> $GITHUB_ENV
        fi

    - name: Esegui il Cecchino Oracle
      if: env.IS_DUPLICATE != 'true'
      env:
        OCI_USER: ${{ secrets.OCI_USER }}
        OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      run: python sniper.py

    - name: Riavvia il loop istantaneamente
      if: always() && env.IS_DUPLICATE != 'true'
      env:
        # Usiamo il token standard anche qui per il riavvio
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -f "vittoria.txt" ]; then
          echo "🎉 Server creato con successo! Il cecchino si ferma qui."
        else
          echo "🔄 Sessione conclusa o errore. Lancio un nuovo ciclo immediato..."
          sleep 5
          gh workflow run oracle_sniper.yml --ref ${{ github.ref_name }}
        fi

name: Oracle Ampere Sniper

on:
  schedule:
    # Resta attivo ogni 6 ore come "salvagente" se l'auto-riavvio dovesse bloccarsi
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permette l'avvio manuale e l'auto-riavvio automatico

jobs:
  run-sniper:
    runs-on: ubuntu-latest

    steps:
    - name: Controlla il codice dal repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Esegui il Cecchino Oracle
      id: sniper_step
      env:
        OCI_USER: ${{ secrets.OCI_USER }}
        OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      # Esegui lo script e intercetta l'exit code. Se è 0 o 88 gestisce il flusso, altrimenti fallisce
      run: |
        python sniper.py || exit_code=$?
        if [ "$exit_code" = "88" ] || [ "$exit_code" = "0" ] || [ "$exit_code" = "" ]; then
          echo "SHOULD_RESTART=true" >> $GITHUB_ENV
          if [ "$exit_code" = "0" ]; then
            echo "🎉 Vittoria rilevata! Il loop si fermerà dopo il prossimo check."
            echo "SHOULD_RESTART=false" >> $GITHUB_ENV
          fi
        else
          echo "SHOULD_RESTART=true" >> $GITHUB_ENV
          echo "⚠️ Errore generico dello script, provo comunque a riavviare."
        fi

    - name: Riavvia il loop istantaneamente
      # 'if: always()' costringe questo step a girare sempre, anche se l'azione sopra è stata cancellata o è fallita
      if: always()
      env:
        # Se lo step sopra ha esplicitamente decretato la vittoria, non riavviare
        RESTART_STATUS: ${{ env.SHOULD_RESTART }}
      run: |
        if [ "$RESTART_STATUS" = "false" ]; then
          echo "✅ Server creato con successo. Nessun riavvio necessario!"
        else
          echo "🔄 Sessione conclusa o interrotta. Lancio un nuovo ciclo immediato..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/oracle_sniper.yml/dispatches \
            -d '{"ref":"main"}'
        fi

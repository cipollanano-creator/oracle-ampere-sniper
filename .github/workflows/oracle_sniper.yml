name: Oracle Ampere Sniper

on:
  schedule:
    # Resta attivo ogni 6 ore come "salvagente" se qualcosa dovesse andare in errore
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permette l'avvio manuale e l'auto-riavvio automatico

jobs:
  run-sniper:
    runs-on: ubuntu-latest

    steps:
    - name: Controlla il codice dal repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Esegui il Cecchino Oracle
      id: sniper_step
      env:
        OCI_USER: ${{ secrets.OCI_USER }}
        OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      # Intercettiamo l'uscita programmata (Exit code 88) per attivare il riavvio
      run: |
        python sniper.py || exit_code=$?
        if [ "$exit_code" = "88" ]; then
          echo "TIMEOUT_REACHED=true" >> $GITHUB_ENV
        elif [ "$exit_code" != "0" ] && [ "$exit_code" != "" ]; then
          exit $exit_code
        fi

    - name: Riavvia il loop istantaneamente
      if: env.TIMEOUT_REACHED == 'true'
      run: |
        echo "🔄 Tempo sessione scaduto. Lancio un nuovo ciclo immediato..."
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/oracle_sniper.yml/dispatches \
          -d '{"ref":"main"}'

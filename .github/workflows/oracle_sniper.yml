name: Oracle Ampere Sniper

on:
  schedule:
    # Esegue lo script ogni 6 ore automaticamente
    - cron: '0 */6 * * *'
  workflow_dispatch: # Ti permette di avviarlo manualmente quando vuoi dal sito

jobs:
  run-sniper:
    runs-on: ubuntu-latest

    steps:
    - name: Controlla il codice dal repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Esegui il Cecchino Oracle
      env:
        OCI_USER: ${{ secrets.OCI_USER }}
        OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      run: python sniper.py

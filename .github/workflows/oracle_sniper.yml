name: Oracle Ampere Sniper
on:
  schedule:
    # Il salvagente scatta ogni 6 ore se il loop si è interrotto per qualche motivo
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Gestione concorrenza corretta
concurrency:
  group: oracle-sniper-group
  cancel-in-progress: true # Se il cron scatta mentre il loop è già attivo, killa il cron duplicato per evitare code infinite

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    steps:
    - name: Controlla il codice dal repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Controlla duplicati
      env:
        GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      run: |
        RUNNING=$(gh run list --workflow=sniper.yml \
          --status=in_progress --json databaseId --jq 'length')
        if [ "$RUNNING" -gt "1" ]; then
          echo "⛔ Duplicato rilevato, esco."
          exit 0
        fi

    - name: Esegui il Cecchino Oracle
      id: sniper_run
      env:
        OCI_USER: ${{ secrets.OCI_USER }}
        OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_CONTENT }}
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      run: python sniper.py

    - name: Riavvia il loop istantaneamente
      if: always()
      env:
        GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      run: |
        if [ -f "vittoria.txt" ]; then
          echo "🎉 Server creato con successo! Il cecchino si ferma qui."
        else
          echo "🔄 Sessione conclusa o errore. Lancio un nuovo ciclo immediato..."
          sleep 5
          gh workflow run sniper.yml --ref ${{ github.ref_name }}
        fi
